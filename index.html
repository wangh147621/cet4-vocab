<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>四级词汇 · CET4 Vocab</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CET-4">
<style>
  :root {
    --bg: #0f0f1a;
    --card-bg: #1a1a2e;
    --text: #e0e0e8;
    --accent: #6c8cff;
    --accent2: #ff6b8a;
    --green: #4ade80;
    --yellow: #facc15;
    --muted: #707088;
    --border: rgba(255,255,255,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; min-height: 100dvh;
    user-select: none; -webkit-user-select: none;
    overflow-x: hidden;
  }
  #app {
    width: 100%; max-width: 500px;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 20px;
  }
  
  /* ---- Header ---- */
  header {
    display: flex; justify-content: space-between; align-items: center;
  }
  header h1 {
    font-size: 20px; font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .tab-switch {
    display: flex; gap: 4px; background: var(--card-bg);
    border-radius: 10px; padding: 3px;
  }
  .tab-switch button {
    border: none; background: transparent; color: var(--muted);
    padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer;
    transition: all 0.2s; font-weight: 500;
  }
  .tab-switch button.active {
    background: rgba(108,140,255,0.15); color: var(--accent);
  }

  /* ---- Stats bar ---- */
  .stats-bar {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; color: var(--muted);
  }
  .stats-bar .count { color: var(--text); font-weight: 600; font-size: 15px; }
  .progress-track {
    flex: 1; margin: 0 16px; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 2px; transition: width 0.4s ease;
  }

  /* ---- Card ---- */
  .card-container {
    perspective: 800px;
    height: 320px;
  }
  .card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    padding: 32px 28px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }
  .card-back {
    transform: rotateY(180deg);
  }

  .word {
    font-size: 42px; font-weight: 800; letter-spacing: 2px;
    margin-bottom: 8px; text-align: center;
  }
  .phonetic {
    font-size: 16px; color: var(--muted); margin-bottom: 4px;
    font-family: 'SF Mono', 'JetBrains Mono', monospace;
    text-align: center;
  }
  .pos-tag {
    font-size: 12px; color: var(--accent); background: rgba(108,140,255,0.1);
    padding: 2px 10px; border-radius: 10px; margin-bottom: 12px; font-weight: 500;
  }
  .meaning {
    font-size: 18px; text-align: center; line-height: 1.5; color: #c8c8d8;
  }
  .example {
    margin-top: 16px; font-size: 14px; color: var(--muted); text-align: center; line-height: 1.6;
    font-style: italic;
  }
  .example b { color: var(--accent); font-style: normal; }

  /* ---- Audio button ---- */
  .audio-btn {
    margin-top: 16px;
    width: 52px; height: 52px; border-radius: 50%;
    border: 2px solid rgba(108,140,255,0.3);
    background: rgba(108,140,255,0.08);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-size: 22px;
  }
  .audio-btn:hover { background: rgba(108,140,255,0.18); border-color: rgba(108,140,255,0.5); }
  .audio-btn:active { transform: scale(0.93); }
  .audio-btn.playing {
    background: rgba(108,140,255,0.22); border-color: var(--accent);
    animation: pulse-audio 0.8s ease infinite;
  }
  @keyframes pulse-audio {
    0%, 100% { box-shadow: 0 0 0 0 rgba(108,140,255,0.4); }
    50% { box-shadow: 0 0 0 16px rgba(108,140,255,0); }
  }

  /* ---- Actions ---- */
  .actions {
    display: flex; gap: 12px;
  }
  .actions button {
    flex: 1; padding: 14px; border-radius: 14px;
    border: none; cursor: pointer; font-size: 15px; font-weight: 600;
    transition: all 0.2s; letter-spacing: 0.5px;
  }
  .btn-know {
    background: rgba(74,222,128,0.12); color: var(--green);
    border: 1px solid rgba(74,222,128,0.2);
  }
  .btn-know:hover { background: rgba(74,222,128,0.22); }
  .btn-unknown {
    background: rgba(255,107,138,0.1); color: var(--accent2);
    border: 1px solid rgba(255,107,138,0.18);
  }
  .btn-unknown:hover { background: rgba(255,107,138,0.2); }

  /* ---- Review list ---- */
  .review-list { display: flex; flex-direction: column; gap: 8px; }
  .review-item {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .review-item:hover { border-color: rgba(108,140,255,0.3); }
  .review-item .rw {
    flex: 1; font-size: 16px; font-weight: 600;
  }
  .review-item .rm {
    font-size: 13px; color: var(--muted);
  }
  .mini-audio {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid rgba(108,140,255,0.25);
    background: transparent; color: var(--accent);
    cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* ---- Keyboard hints ---- */
  .hint {
    text-align: center; font-size: 12px; color: var(--muted);
    display: flex; justify-content: center; gap: 16px;
  }
  .hint kbd {
    background: rgba(255,255,255,0.06); padding: 2px 8px;
    border-radius: 4px; border: 1px solid rgba(255,255,255,0.1);
    font-size: 11px; font-family: 'SF Mono', monospace;
  }

  /* ---- Animation ---- */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-face { animation: slideIn 0.35s ease; }

  /* ---- Settings ---- */
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; font-size: 14px;
  }
  .settings-row select {
    background: var(--card-bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 12px; font-size: 13px;
  }

  /* ---- Word list ---- */
  .search-bar {
    width: 100%; padding: 10px 16px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--card-bg);
    color: var(--text); font-size: 14px; outline: none;
  }
  .search-bar::placeholder { color: var(--muted); }
  .search-bar:focus { border-color: var(--accent); }
  .word-table {
    width: 100%; margin-top: 12px; border-collapse: collapse;
  }
  .word-table th {
    text-align: left; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 1;
  }
  .word-table td {
    padding: 10px 10px; font-size: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    vertical-align: middle;
  }
  .word-table tr { cursor: pointer; transition: background 0.15s; }
  .word-table tr:hover { background: rgba(108,140,255,0.06); }
  .word-table .col-word { font-weight: 700; color: var(--text); font-size: 15px; }
  .word-table .col-phonetic { font-family: 'SF Mono', monospace; color: var(--muted); font-size: 12px; white-space: nowrap; }
  .word-table .col-meaning { font-size: 13px; color: #c0c0cc; line-height: 1.4; }
  .word-table .col-audio { width: 36px; text-align: center; }
  .table-mini-audio {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(108,140,255,0.2);
    background: transparent; color: var(--accent);
    cursor: pointer; font-size: 11px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .table-mini-audio:active { transform: scale(0.9); background: rgba(108,140,255,0.15); }
  .list-scroll {
    max-height: calc(100vh - 220px); overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  @media (max-width: 400px) {
    .word { font-size: 32px; }
    .card-container { height: 280px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>📖 CET-4</h1>
    <div style="display:flex;align-items:center;gap:8px;">
      <button id="install-btn" style="display:none;background:rgba(108,140,255,0.15);color:var(--accent);border:1px solid rgba(108,140,255,0.3);padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;" onclick="installApp()">📲 安装</button>
      <div class="tab-switch">
        <button onclick="switchTab('learn')" id="tab-learn" class="active">学习</button>
        <button onclick="switchTab('review')" id="tab-review">复习</button>
        <button onclick="switchTab('list')" id="tab-list">单词表</button>
      </div>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <span class="count" id="stat-progress">0/0</span>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <span id="stat-mastery">0%</span>
  </div>

  <!-- Learn tab -->
  <div id="view-learn">
    <div class="card-container">
      <div class="card" id="card">
        <div class="card-face card-front" id="card-front">
          <div class="word" id="word-el">abandon</div>
          <div class="phonetic" id="phonetic-el">/əˈbændən/</div>
          <div class="pos-tag" id="pos-el">v.</div>
          <div class="meaning" id="meaning-el">放弃，抛弃</div>
          <button class="audio-btn" id="audio-btn" onclick="speakWord()" title="点击发音">🔊</button>
          <div style="font-size:11px;color:var(--muted);margin-top:6px;">👆 点喇叭发音 · 点卡片看例句</div>
        </div>
        <div class="card-face card-back" id="card-back">
          <div class="word" id="word-el-back">abandon</div>
          <div class="example" id="example-el">They had to <b>abandon</b> the plan.</div>
          <button class="audio-btn" onclick="speakWord()">🔊</button>
          <div style="font-size:11px;color:var(--muted);margin-top:6px;">再次点击翻转</div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-unknown" id="btn-unknown" onclick="markUnknown()">不认识</button>
      <button class="btn-know" id="btn-know" onclick="markKnown()">认识</button>
    </div>

    <div class="hint">
      <span><kbd>←</kbd> 不认识</span>
      <span><kbd>→</kbd> 认识</span>
      <span><kbd>空格</kbd> 翻转/发音</span>
    </div>
  </div>

  <!-- Review tab -->
  <div id="view-review" style="display:none;">
    <div style="font-size:13px;color:var(--muted);margin-bottom:4px;" id="review-count">待复习：0 个单词</div>
    <div class="review-list" id="review-list"></div>
  </div>

  <!-- Word list tab -->
  <div id="view-list" style="display:none;">
    <input class="search-bar" id="search-input" type="text" placeholder="搜索单词..." oninput="renderWordList()">
    <div class="list-scroll">
      <table class="word-table">
        <thead><tr>
          <th class="col-audio">🔊</th>
          <th>单词</th>
          <th>音标</th>
          <th>释义</th>
        </tr></thead>
        <tbody id="word-table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ==================== 四级核心词汇库 ====================
const VOCAB = [
  { w:"abandon", p:"/əˈbændən/", m:"v. 放弃，抛弃；n. 放任", e:"They had to <b>abandon</b> the sinking ship." },

  { w:"vulnerable", p:"/ˈvʌlnərəbl/", m:"adj. 脆弱的，易受伤的", e:"Children are <b>vulnerable</b> to diseases." },

  { w:"witness", p:"/ˈwɪtnəs/", m:"n./v. 目击者；见证", e:"I was a <b>witness</b> to the accident." },
  { w:"worthwhile", p:"/ˌwɜːθˈwaɪl/", m:"adj. 值得的", e:"It was a <b>worthwhile</b> experience." },
  { w:"yield", p:"/jiːld/", m:"v. 产生；屈服；n. 产量", e:"The investigation <b>yielded</b> new evidence." },
];

// ==================== 应用状态 ====================
let currentTab = 'learn';
let currentIndex = 0;
let knownWords = new Set();    // 认识的
let unknownWords = new Set();  // 不认识的
let seenWords = new Set();     // 已见过
let learnedCount = 0;          // 认识的次数（用于判断掌握）
let wordQueue = [];            // 学习队列（随机顺序）
let isFlipped = false;
let isSpeaking = false;

// ==================== 初始化 ====================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initLearn() {
  wordQueue = shuffle([...Array(VOCAB.length).keys()]);
  currentIndex = 0;
  isFlipped = false;
  updateCard();
  updateStats();
}

function updateCard() {
  if (wordQueue.length === 0) {
    // 全部学完，重新洗牌不认识的和没见过的
    const remaining = [];
    for (let i = 0; i < VOCAB.length; i++) {
      if (!knownWords.has(i)) remaining.push(i);
    }
    if (remaining.length === 0) {
      document.getElementById('word-el').textContent = '🎉';
      document.getElementById('phonetic-el').textContent = '';
      document.getElementById('pos-el').textContent = '';
      document.getElementById('meaning-el').textContent = '全部掌握！';
      document.getElementById('example-el').innerHTML = '你已学完所有单词，太棒了！';
      document.getElementById('card').classList.remove('flipped');
      isFlipped = false;
      document.getElementById('stat-progress').textContent = `${VOCAB.length}/${VOCAB.length}`;
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('stat-mastery').textContent = '100%';
      return;
    }
    wordQueue = shuffle(remaining);
    currentIndex = 0;
  }
  if (currentIndex >= wordQueue.length) currentIndex = 0;

  const wordIdx = wordQueue[currentIndex];
  const v = VOCAB[wordIdx];

  document.getElementById('word-el').textContent = v.w;
  document.getElementById('phonetic-el').textContent = v.p;
  document.getElementById('meaning-el').textContent = v.m;
  document.getElementById('word-el-back').textContent = v.w;
  document.getElementById('example-el').innerHTML = v.e;

  // 词性标签
  const meaning = v.m;
  let pos = '';
  if (meaning.startsWith('v.')) pos = 'verb';
  else if (meaning.startsWith('n.')) pos = 'noun';
  else if (meaning.startsWith('adj.')) pos = 'adjective';
  else if (meaning.startsWith('adv.')) pos = 'adverb';
  else if (meaning.startsWith('prep.')) pos = 'preposition';
  else if (meaning.startsWith('conj.')) pos = 'conjunction';
  else pos = 'word';
  document.getElementById('pos-el').textContent = pos;

  document.getElementById('card').classList.remove('flipped');
  isFlipped = false;
  updateStats();

  // 移动端需要用户手势才能发音，不自动读
  // 首次点击页面任意位置激活语音引擎
  if (!window._speechReady) {
    window._speechReady = false;
  }
}

function updateStats() {
  const total = VOCAB.length;
  const known = knownWords.size;
  const seen = seenWords.size;
  document.getElementById('stat-progress').textContent = `${seen}/${total}`;
  document.getElementById('progress-fill').style.width = `${(known / total * 100)}%`;
  document.getElementById('stat-mastery').textContent = `${Math.round(known / total * 100)}%`;

  // 复习tab
  document.getElementById('review-count').textContent = `待复习：${unknownWords.size} 个单词`;
  renderReviewList();
}

// ==================== 正宗美式发音引擎 ====================
let americanVoice = null;

function loadAmericanVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (voices.length === 0) return null;

  // 美式英语优选列表（按质量排序）
  const prefer = [
    'Google US English',
    'Samantha',
    'Alex',
    'Microsoft David',
    'Microsoft Zira',
    'Karen',
    'Moira',
    'Tessa',
    'Daniel',
    'Fiona',
  ];

  // 先按优选列表匹配
  for (const name of prefer) {
    const found = voices.find(v => v.name === name && v.lang.startsWith('en-US'));
    if (found) return found;
  }

  // 再选任意 en-US 的高质量 voice（priority 通常是 'Default' 最高）
  const usVoices = voices
    .filter(v => v.lang.startsWith('en-US'))
    .sort((a, b) => {
      // 优先不带 localService 的（通常是系统内置高质量）
      if (a.localService && !b.localService) return 1;
      if (!a.localService && b.localService) return -1;
      return 0;
    });

  return usVoices[0] || null;
}

function ensureAmericanVoice() {
  if (americanVoice) return americanVoice;
  americanVoice = loadAmericanVoice();
  return americanVoice;
}

// voices 是异步加载的，监听变化
window.speechSynthesis.onvoiceschanged = () => {
  americanVoice = loadAmericanVoice();
};

// 初始加载（部分浏览器同步返回）
americanVoice = loadAmericanVoice();

function speakWord() {
  if (wordQueue.length === 0) return;

  // Android Chrome SpeechSynthesis bug workaround: cancel + resume
  window.speechSynthesis.cancel();

  const wordIdx = wordQueue[currentIndex];
  const word = VOCAB[wordIdx].w;

  const utterance = new SpeechSynthesisUtterance(word);
  const voice = ensureAmericanVoice();
  if (voice) utterance.voice = voice;
  utterance.lang = 'en-US';
  utterance.rate = 0.9;
  utterance.pitch = 1;
  utterance.volume = 1;

  const btn = document.getElementById('audio-btn');
  if (btn) btn.classList.add('playing');
  isSpeaking = true;

  // Android Chrome 有时不触发 onend，用超时兜底
  let settled = false;
  const done = () => {
    if (settled) return;
    settled = true;
    if (btn) btn.classList.remove('playing');
    isSpeaking = false;
  };

  utterance.onend = done;
  utterance.onerror = done;

  // 兜底超时（粗略估算：每秒约 3 个音节）
  setTimeout(done, Math.max(800, word.length * 300));

  window.speechSynthesis.speak(utterance);

  // Android Chrome 有时 speak 后立即 pause，需要 resume
  setTimeout(() => {
    if (window.speechSynthesis.paused) {
      window.speechSynthesis.resume();
    }
  }, 50);
}

// ==================== 卡片翻转 ====================
function flipCard() {
  const card = document.getElementById('card');
  isFlipped = !isFlipped;
  if (isFlipped) {
    card.classList.add('flipped');
    // 翻转后再读一次
    setTimeout(() => speakWord(), 400);
  } else {
    card.classList.remove('flipped');
  }
}

document.getElementById('card').addEventListener('click', (e) => {
  if (e.target.closest('.audio-btn')) return; // 不拦截发音按钮
  flipCard();
});

// ==================== 认识 / 不认识 ====================
function markKnown() {
  if (wordQueue.length === 0) return;
  const wordIdx = wordQueue[currentIndex];
  knownWords.add(wordIdx);
  unknownWords.delete(wordIdx);
  seenWords.add(wordIdx);
  nextWord();
}

function markUnknown() {
  if (wordQueue.length === 0) return;
  const wordIdx = wordQueue[currentIndex];
  unknownWords.add(wordIdx);
  knownWords.delete(wordIdx);
  seenWords.add(wordIdx);
  nextWord();
}

function nextWord() {
  currentIndex++;
  if (currentIndex >= wordQueue.length) {
    // 重新洗牌，优先不认识 + 未见过
    const remaining = [];
    for (let i = 0; i < VOCAB.length; i++) {
      if (!knownWords.has(i)) remaining.push(i);
    }
    if (remaining.length === 0) {
      wordQueue = [];
      updateCard();
      return;
    }
    wordQueue = shuffle(remaining);
    currentIndex = 0;
  }
  updateCard();
}

// ==================== 复习列表 ====================
function renderReviewList() {
  const list = document.getElementById('review-list');
  if (unknownWords.size === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;">暂无待复习单词</div>';
    return;
  }
  list.innerHTML = [...unknownWords].map(idx => {
    const v = VOCAB[idx];
    return `<div class="review-item" onclick="reviewWord(${idx})">
      <button class="mini-audio" onclick="event.stopPropagation();speakReviewWord(${idx})">🔊</button>
      <span class="rw">${v.w}</span>
      <span class="rm">${v.m}</span>
    </div>`;
  }).join('');
}

function speakReviewWord(idx) {
  window.speechSynthesis.cancel();
  const word = VOCAB[idx].w;
  const utterance = new SpeechSynthesisUtterance(word);
  const voice = ensureAmericanVoice();
  if (voice) utterance.voice = voice;
  utterance.lang = 'en-US';
  utterance.rate = 0.9;
  utterance.volume = 1;
  setTimeout(() => {
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
  }, 50);
  window.speechSynthesis.speak(utterance);
}

function reviewWord(idx) {
  // 切到学习tab并定位到该单词
  switchTab('learn');
  wordQueue = [idx];
  currentIndex = 0;
  updateCard();
}

// ==================== Tab切换 ====================
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-learn').classList.toggle('active', tab === 'learn');
  document.getElementById('tab-review').classList.toggle('active', tab === 'review');
  document.getElementById('tab-list').classList.toggle('active', tab === 'list');
  document.getElementById('view-learn').style.display = tab === 'learn' ? 'block' : 'none';
  document.getElementById('view-review').style.display = tab === 'review' ? 'block' : 'none';
  document.getElementById('view-list').style.display = tab === 'list' ? 'block' : 'none';
  if (tab === 'review') updateStats();
  if (tab === 'list') renderWordList();
}

// ==================== 单词表 ====================
function renderWordList() {
  const tbody = document.getElementById('word-table-body');
  const query = (document.getElementById('search-input').value || '').toLowerCase().trim();
  let words = VOCAB;
  if (query) {
    words = VOCAB.filter(v =>
      v.w.toLowerCase().includes(query) ||
      v.m.toLowerCase().includes(query)
    );
  }
  tbody.innerHTML = words.map((v, i) => {
    const origIdx = VOCAB.indexOf(v);
    return `<tr onclick="openWordFromList(${origIdx})">
      <td class="col-audio">
        <button class="table-mini-audio" onclick="event.stopPropagation();speakWordFromList(${origIdx})">🔊</button>
      </td>
      <td class="col-word">${v.w}</td>
      <td class="col-phonetic">${v.p}</td>
      <td class="col-meaning">${v.m}</td>
    </tr>`;
  }).join('');
}

function speakWordFromList(idx) {
  window.speechSynthesis.cancel();
  const word = VOCAB[idx].w;
  const utterance = new SpeechSynthesisUtterance(word);
  const voice = ensureAmericanVoice();
  if (voice) utterance.voice = voice;
  utterance.lang = 'en-US';
  utterance.rate = 0.9;
  setTimeout(() => {
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
  }, 50);
  window.speechSynthesis.speak(utterance);
}

function openWordFromList(idx) {
  switchTab('learn');
  wordQueue = [idx];
  currentIndex = 0;
  updateCard();
}

// ==================== 键盘快捷键 ====================
window.addEventListener('keydown', e => {
  if (currentTab !== 'learn') return;

  if (e.code === 'ArrowLeft') {
    e.preventDefault();
    markUnknown();
  } else if (e.code === 'ArrowRight') {
    e.preventDefault();
    markKnown();
  } else if (e.code === 'Space') {
    e.preventDefault();
    if (isFlipped) {
      flipCard();
    } else {
      speakWord();
    }
  } else if (e.code === 'ArrowUp' || e.code === 'ArrowDown') {
    e.preventDefault();
    flipCard();
  }
});

// ==================== 启动 ====================
// 注册 Service Worker（PWA 离线支持）
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(() => {
    console.log('✅ SW registered — offline ready');
  }).catch(err => {
    console.warn('SW registration failed:', err);
  });
}

// 监听 beforeinstallprompt（Chrome 自动提示安装）
let deferredPrompt = null;
let installTipShown = false;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.getElementById('install-btn');
  if (btn) btn.style.display = 'inline-block';
});

// 页面加载后 3 秒如果还没触发 beforeinstallprompt，显示菜单安装提示
setTimeout(() => {
  if (!deferredPrompt && !installTipShown && !window.matchMedia('(display-mode: standalone)').matches) {
    installTipShown = true;
    const tip = document.createElement('div');
    tip.id = 'install-tip';
    tip.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(108,140,255,0.95);color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;z-index:999;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.4);cursor:pointer;max-width:90%;';
    tip.innerHTML = '📲 点右上角菜单 → <b>安装应用</b><br><span style="font-size:11px;opacity:0.8;">添加到桌面，离线也能用</span>';
    tip.onclick = () => tip.remove();
    document.body.appendChild(tip);
    setTimeout(() => { if (tip.parentNode) tip.remove(); }, 8000);
  }
}, 4000);

// 手动安装
function installApp() {
  if (!deferredPrompt) {
    alert('请点右上角菜单 → 「安装应用」或「添加到主屏幕」');
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(result => {
    if (result.outcome === 'accepted') {
      const btn = document.getElementById('install-btn');
      if (btn) btn.style.display = 'none';
    }
    deferredPrompt = null;
  });
}

initLearn();
