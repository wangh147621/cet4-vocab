<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>四级词汇 · CET4 Vocab</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card-bg: #1a1a2e;
    --text: #e0e0e8;
    --accent: #6c8cff;
    --accent2: #ff6b8a;
    --green: #4ade80;
    --muted: #707088;
    --border: rgba(255,255,255,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', sans-serif;

    min-height: 100vh; min-height: 100dvh;
    user-select: none; -webkit-user-select: none; overflow-x: hidden;
  }
  #app { width: 100%; max-width: 500px; padding: 20px 16px; display: flex; flex-direction: column; gap: 20px; }
  header { display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; background: linear-gradient(135deg, var(--accent), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .tab-switch { display: flex; gap: 4px; background: var(--card-bg); border-radius: 10px; padding: 3px; }
  .tab-switch button { border: none; background: transparent; color: var(--muted); padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .tab-switch button.active { background: rgba(108,140,255,0.15); color: var(--accent); }
  .stats-bar { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--muted); }
  .stats-bar .count { color: var(--text); font-weight: 600; font-size: 15px; }
  .progress-track { flex: 1; margin: 0 16px; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 2px; transition: width 0.4s ease; }
  .card-container { perspective: 800px; height: 320px; }
  .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
  .card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 20px; background: var(--card-bg); border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 28px; box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
  .card-back { transform: rotateY(180deg); }
  .word { font-size: 42px; font-weight: 800; letter-spacing: 2px; margin-bottom: 8px; text-align: center; }
  .phonetic { font-size: 16px; color: var(--muted); margin-bottom: 4px; font-family: 'SF Mono', 'JetBrains Mono', monospace; text-align: center; }
  .pos-tag { font-size: 12px; color: var(--accent); background: rgba(108,140,255,0.1); padding: 2px 10px; border-radius: 10px; margin-bottom: 12px; font-weight: 500; }
  .meaning { font-size: 18px; text-align: center; line-height: 1.5; color: #c8c8d8; }
  .example { margin-top: 16px; font-size: 14px; color: var(--muted); text-align: center; line-height: 1.6; font-style: italic; }
  .example b { color: var(--accent); font-style: normal; }
  .audio-btn { margin-top: 16px; width: 52px; height: 52px; border-radius: 50%; border: 2px solid rgba(108,140,255,0.3); background: rgba(108,140,255,0.08); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 22px; }
  .audio-btn:hover { background: rgba(108,140,255,0.18); border-color: rgba(108,140,255,0.5); }
  .audio-btn:active { transform: scale(0.93); }
  .audio-btn.playing { background: rgba(108,140,255,0.22); border-color: var(--accent); animation: pulse-audio 0.8s ease infinite; }
  @keyframes pulse-audio { 0%, 100% { box-shadow: 0 0 0 0 rgba(108,140,255,0.4); } 50% { box-shadow: 0 0 0 16px rgba(108,140,255,0); } }
  .actions { display: flex; gap: 12px; }
  .actions button { flex: 1; padding: 14px; border-radius: 14px; border: none; cursor: pointer; font-size: 15px; font-weight: 600; transition: all 0.2s; letter-spacing: 0.5px; }
  .btn-know { background: rgba(74,222,128,0.12); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }

  .btn-unknown { background: rgba(255,107,138,0.1); color: var(--accent2); border: 1px solid rgba(255,107,138,0.18); }
  .btn-unknown:hover { background: rgba(255,107,138,0.2); }
  .review-list { display: flex; flex-direction: column; gap: 8px; }
  .review-item { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; }
  .review-item:hover { border-color: rgba(108,140,255,0.3); }
  .review-item .rw { flex: 1; font-size: 16px; font-weight: 600; }
  .review-item .rm { font-size: 13px; color: var(--muted); }
  .mini-audio { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(108,140,255,0.25); background: transparent; color: var(--accent); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .hint { text-align: center; font-size: 12px; color: var(--muted); display: flex; justify-content: center; gap: 16px; }

  .search-bar { width: 100%; padding: 10px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 14px; outline: none; }
  .search-bar::placeholder { color: var(--muted); }
  .search-bar:focus { border-color: var(--accent); }
  .word-table { width: 100%; margin-top: 12px; border-collapse: collapse; }
  .word-table th { text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 8px 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 1; }
  .word-table td { padding: 10px 10px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
  .word-table tr { cursor: pointer; transition: background 0.15s; }
  .word-table tr:hover { background: rgba(108,140,255,0.06); }
  .word-table .col-word { font-weight: 700; color: var(--text); font-size: 15px; }
  .word-table .col-phonetic { font-family: 'SF Mono', monospace; color: var(--muted); font-size: 12px; white-space: nowrap; }
  .word-table .col-meaning { font-size: 13px; color: #c0c0cc; line-height: 1.4; }
  .word-table .col-audio { width: 36px; text-align: center; }
  .table-mini-audio { width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(108,140,255,0.2); background: transparent; color: var(--accent); cursor: pointer; font-size: 11px; display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .table-mini-audio:active { transform: scale(0.9); background: rgba(108,140,255,0.15); }
  .list-scroll { max-height: calc(100vh - 220px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
  @media (max-width: 400px) { .word { font-size: 32px; } .card-container { height: 280px; } }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>📖 CET-4</h1>
    <div class="tab-switch">
      <button onclick="switchTab('learn')" id="tab-learn" class="active">学习</button>

  <div id="view-learn">
    <div class="card-container">

    </div>
    <div class="actions">

    </div>
    <div style="text-align:center;margin-top:8px;"><a href="javascript:if(confirm('确定要重置所有学习进度吗？')){localStorage.removeItem('cet4_vocab_progress');location.reload();}" style="color:var(--muted);font-size:11px;text-decoration:none;">重置进度</a></div>

    <div class="review-list" id="review-list"></div>

  <div id="view-list" style="display:none;">
    <input class="search-bar" id="search-input" type="text" placeholder="搜索单词..." oninput="renderWordList()">
    <div class="list-scroll">
      <table class="word-table">

        <tbody id="word-table-body"></tbody>
      </table>
    </div>
  </div>
</div>

  { w:"warn", p:"/wɔːn/", m:"v. 警告；提醒", e:"I must <b>warn</b> you about the danger." },
  { w:"wave", p:"/weɪv/", m:"n. 波浪；v. 挥手", e:"She <b>waved</b> goodbye to her friends." },
  { w:"weakness", p:"/ˈwiːknəs/", m:"n. 弱点；虚弱", e:"Everyone has their <b>weaknesses</b>." },
  { w:"wealth", p:"/welθ/", m:"n. 财富；富裕", e:"Health is more important than <b>wealth</b>." },
  { w:"weapon", p:"/ˈwepən/", m:"n. 武器；兵器", e:"They searched for the murder <b>weapon</b>." },
  { w:"weekly", p:"/ˈwiːkli/", m:"adj./adv. 每周的；每周", e:"She writes a <b>weekly</b> column for the newspaper." },
  { w:"weigh", p:"/weɪ/", m:"v. 称重；权衡", e:"How much do you <b>weigh</b>?" },
  { w:"whisper", p:"/ˈwɪspə(r)/", m:"v./n. 低声说；耳语", e:"She <b>whispered</b> a secret in my ear." },
  { w:"willing", p:"/ˈwɪlɪŋ/", m:"adj. 愿意的；乐意的", e:"Are you <b>willing</b> to help?" },
  { w:"wind", p:"/wɪnd/", m:"n. 风；v. 缠绕", e:"The <b>wind</b> is blowing strongly." },
  { w:"wipe", p:"/waɪp/", m:"v./n. 擦拭；抹", e:"Please <b>wipe</b> the table clean." },
  { w:"wisdom", p:"/ˈwɪzdəm/", m:"n. 智慧；明智", e:"He is a man of great <b>wisdom</b>." },
  { w:"wonder", p:"/ˈwʌndə(r)/", m:"v./n. 想知道；奇迹", e:"I <b>wonder</b> what happened." },
  { w:"workshop", p:"/ˈwɜːkʃɒp/", m:"n. 车间；研讨会", e:"She attended a writing <b>workshop</b>." },
  { w:"wound", p:"/wuːnd/", m:"n. 伤口；v. 受伤", e:"The <b>wound</b> took weeks to heal." },
  { w:"wrap", p:"/ræp/", m:"v. 包裹；缠绕", e:"Please <b>wrap</b> the gift nicely." },
  { w:"yell", p:"/jel/", m:"v./n. 叫喊；大喊", e:"Don't <b>yell</b> at me!" },
  { w:"zone", p:"/zəʊn/", m:"n. 区域；地带", e:"This is a no-parking <b>zone</b>." },
];

let currentTab = 'learn', currentIndex = 0;
let knownWords = new Set(), unknownWords = new Set(), seenWords = new Set();
let wordQueue = [];
let isFlipped = false, isSpeaking = false;

// ---- 进度持久化（localStorage）----
const STORAGE_KEY = 'cet4_vocab_progress';

function saveProgress() {
  const data = {
    known: [...knownWords],
    unknown: [...unknownWords],
    seen: [...seenWords],
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (data.known) knownWords = new Set(data.known);
    if (data.unknown) unknownWords = new Set(data.unknown);
    if (data.seen) seenWords = new Set(data.seen);
    return true;
  } catch(e) { return false; }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function initLearn() {
  // 尝试恢复上次进度
  loadProgress();
  // 构建队列：不认识优先 > 没见过 > 认识（复习时穿插）
  const allIdx = [...Array(VOCAB.length).keys()];
  const unseen = allIdx.filter(i => !seenWords.has(i));
  // 不认识的排前面，没见过的排中间
  wordQueue = shuffle([...unknownWords]);
  if (unseen.length > 0) wordQueue = wordQueue.concat(shuffle(unseen));
  // 如果队列为空（全部见过），重新洗牌全部
  if (wordQueue.length === 0) wordQueue = shuffle(allIdx);
  currentIndex = 0; isFlipped = false;
  updateCard(); updateStats();
}

function updateCard() {
  if (wordQueue.length === 0) {
    const remaining = [];
    for (let i = 0; i < VOCAB.length; i++) { if (!knownWords.has(i)) remaining.push(i); }
    if (remaining.length === 0) {
      document.getElementById('word-el').textContent = '🎉';
      document.getElementById('phonetic-el').textContent = '';
      document.getElementById('pos-el').textContent = '';
      document.getElementById('meaning-el').textContent = '全部掌握！';
      document.getElementById('example-el').innerHTML = '你已学完所有单词，太棒了！';
      document.getElementById('card').classList.remove('flipped');
      isFlipped = false;
      document.getElementById('stat-progress').textContent = VOCAB.length + '/' + VOCAB.length;
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('stat-mastery').textContent = '100%';
      return;
    }
    wordQueue = shuffle(remaining); currentIndex = 0;
  }
  if (currentIndex >= wordQueue.length) currentIndex = 0;
  const idx = wordQueue[currentIndex], v = VOCAB[idx];
  document.getElementById('word-el').textContent = v.w;
  document.getElementById('phonetic-el').textContent = v.p;
  document.getElementById('meaning-el').textContent = v.m;
  document.getElementById('word-el-back').textContent = v.w;
  document.getElementById('example-el').innerHTML = v.e;
  const m = v.m;
  let pos = 'word';
  if (m.startsWith('v.')) pos = 'verb';
  else if (m.startsWith('n.')) pos = 'noun';
  else if (m.startsWith('adj.')) pos = 'adjective';
  else if (m.startsWith('adv.')) pos = 'adverb';
  else if (m.startsWith('prep.')) pos = 'preposition';
  document.getElementById('pos-el').textContent = pos;
  document.getElementById('card').classList.remove('flipped');
  isFlipped = false;
  updateStats();
  setTimeout(() => speakWord(), 300);
}

function updateStats() {
  const t = VOCAB.length;
  document.getElementById('stat-progress').textContent = seenWords.size + '/' + t;
  document.getElementById('progress-fill').style.width = (knownWords.size / t * 100) + '%';
  document.getElementById('stat-mastery').textContent = Math.round(knownWords.size / t * 100) + '%';
  document.getElementById('review-count').textContent = '待复习：' + unknownWords.size + ' 个单词';
  renderReviewList();
}

// ---- 发音引擎（自动检测：原生 / 有道TTS备用）----
let useNativeSpeech = typeof speechSynthesis !== 'undefined' && speechSynthesis.getVoices;
let audioEl = null;

// 有道词典 TTS（国内通用，UC可用）
// type=0 美式，type=1 英式
function youdaoTTSUrl(word) {
  return 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(word) + '&type=0';
}

let americanVoice = null;
function loadAmericanVoice() {
  if (!useNativeSpeech) return null;
  const voices = speechSynthesis.getVoices();
  if (voices.length === 0) return null;
  const prefer = ['Google US English','Samantha','Alex','Microsoft David','Microsoft Zira','Karen','Moira','Tessa','Daniel','Fiona'];
  for (const name of prefer) {
    const f = voices.find(v => v.name === name && v.lang.startsWith('en-US'));
    if (f) return f;
  }
  return voices.filter(v => v.lang.startsWith('en-US'))[0] || null;
}
function ensureAmericanVoice() { if (!americanVoice) americanVoice = loadAmericanVoice(); return americanVoice; }
if (useNativeSpeech) {
  speechSynthesis.onvoiceschanged = () => { americanVoice = loadAmericanVoice(); };
  americanVoice = loadAmericanVoice();
}

function speakWord() {
  if (wordQueue.length === 0) return;
  const word = VOCAB[wordQueue[currentIndex]].w;
  const btn = document.getElementById('audio-btn');

  if (useNativeSpeech && americanVoice) {
    if (isSpeaking) speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.voice = americanVoice; u.lang = 'en-US'; u.rate = 0.9; u.pitch = 1; u.volume = 1;
    btn.classList.add('playing'); isSpeaking = true;
    u.onend = u.onerror = () => { btn.classList.remove('playing'); isSpeaking = false; };
    speechSynthesis.speak(u);
  } else {
    // 有道TTS备用
    if (audioEl) { audioEl.pause(); audioEl = null; }
    audioEl = new Audio(youdaoTTSUrl(word));
    btn.classList.add('playing');
    audioEl.onended = () => { btn.classList.remove('playing'); audioEl = null; };
    audioEl.onerror = () => { btn.classList.remove('playing'); audioEl = null; };
    audioEl.play().catch(() => { btn.classList.remove('playing'); });
    setTimeout(() => { if (btn.classList.contains('playing')) btn.classList.remove('playing'); }, 3000);
  }
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
  if (isFlipped) setTimeout(() => speakWord(), 400);
}
document.getElementById('card').addEventListener('click', e => {
  if (!e.target.closest('.audio-btn')) flipCard();
});

function markKnown() {
  if (wordQueue.length === 0) return;
  const idx = wordQueue[currentIndex];
  knownWords.add(idx); unknownWords.delete(idx); seenWords.add(idx);
  saveProgress();
  currentIndex++;
  if (currentIndex >= wordQueue.length) { initLearn(); return; }
  updateCard();
}
function markUnknown() {
  if (wordQueue.length === 0) return;
  const idx = wordQueue[currentIndex];
  unknownWords.add(idx); knownWords.delete(idx); seenWords.add(idx);
  saveProgress();
  currentIndex++;
  if (currentIndex >= wordQueue.length) { initLearn(); return; }
  updateCard();
}

function renderReviewList() {
  const list = document.getElementById('review-list');
  if (unknownWords.size === 0) { list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;">暂无待复习单词</div>'; return; }
  list.innerHTML = [...unknownWords].map(idx => {
    const v = VOCAB[idx];
    return '<div class="review-item" onclick="reviewWord('+idx+')"><button class="mini-audio" onclick="event.stopPropagation();speakReviewWord('+idx+')">🔊</button><span class="rw">'+v.w+'</span><span class="rm">'+v.m+'</span></div>';
  }).join('');
}
function speakReviewWord(idx) {
  const word = VOCAB[idx].w;
  if (useNativeSpeech && americanVoice) {
    const u = new SpeechSynthesisUtterance(word);
    u.voice = americanVoice; u.lang = 'en-US'; u.rate = 0.9;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  } else {
    if (audioEl) { audioEl.pause(); audioEl = null; }
    audioEl = new Audio(youdaoTTSUrl(word));
    audioEl.play().catch(() => {});
  }
}
function reviewWord(idx) { switchTab('learn'); wordQueue = [idx]; currentIndex = 0; updateCard(); }

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-learn').classList.toggle('active', tab === 'learn');
  document.getElementById('tab-review').classList.toggle('active', tab === 'review');
  document.getElementById('tab-list').classList.toggle('active', tab === 'list');
  document.getElementById('view-learn').style.display = tab === 'learn' ? 'block' : 'none';
  document.getElementById('view-review').style.display = tab === 'review' ? 'block' : 'none';
  document.getElementById('view-list').style.display = tab === 'list' ? 'block' : 'none';
  if (tab === 'review') updateStats();
  if (tab === 'list') renderWordList();
}

function renderWordList() {
  const q = (document.getElementById('search-input').value || '').toLowerCase().trim();
  let words = q ? VOCAB.filter(v => v.w.toLowerCase().includes(q) || v.m.includes(q)) : VOCAB;
  document.getElementById('word-table-body').innerHTML = words.map(v => {
    const idx = VOCAB.indexOf(v);
    return '<tr onclick="openWordFromList('+idx+')"><td class="col-audio"><button class="table-mini-audio" onclick="event.stopPropagation();speakWordFromList('+idx+')">🔊</button></td><td class="col-word">'+v.w+'</td><td class="col-phonetic">'+v.p+'</td><td class="col-meaning">'+v.m+'</td></tr>';
  }).join('');
}
function speakWordFromList(idx) {
  const word = VOCAB[idx].w;
  if (useNativeSpeech && americanVoice) {
    const u = new SpeechSynthesisUtterance(word);
    u.voice = americanVoice; u.lang = 'en-US'; u.rate = 0.9;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  } else {
    if (audioEl) { audioEl.pause(); audioEl = null; }
    audioEl = new Audio(youdaoTTSUrl(word));
    audioEl.play().catch(() => {});
  }
}
function openWordFromList(idx) { switchTab('learn'); wordQueue = [idx]; currentIndex = 0; updateCard(); }

window.addEventListener('keydown', e => {
  if (currentTab !== 'learn') return;
  if (e.code === 'ArrowLeft') { e.preventDefault(); markUnknown(); }
  else if (e.code === 'ArrowRight') { e.preventDefault(); markKnown(); }
  else if (e.code === 'Space') { e.preventDefault(); isFlipped ? flipCard() : speakWord(); }
  else if (e.code === 'ArrowUp' || e.code === 'ArrowDown') { e.preventDefault(); flipCard(); }
});

initLearn();
</script>
