<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>电缆铜排选型工具 · Cable &amp; Busbar Selector</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--acc:#58a6ff;--green:#3fb950;--warn:#d2991d;--red:#f85149;--muted:#8b949e;--cu:#e6a832;--al:#a8b8c8;--bb:#58a6ff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px 12px}
#app{width:100%;max-width:540px;display:flex;flex-direction:column;gap:16px}
header{text-align:center;padding:6px 0}
header h1{font-size:22px;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,var(--acc),#a371f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--muted);font-size:13px;margin-top:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
label.slabel{font-size:13px;color:var(--muted);font-weight:500;display:block;margin-bottom:7px}
.input-row{display:flex;align-items:center;gap:10px}
.input-row input{flex:1;background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-size:22px;font-weight:700;outline:none;width:100%;transition:border 0.2s}
.input-row input:focus{border-color:var(--acc)}
.input-row .unit{color:var(--acc);font-size:16px;font-weight:600;white-space:nowrap}
.options-row{display:flex;gap:6px;flex-wrap:wrap}
.opt-btn{flex:1;min-width:60px;padding:10px 6px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:12px;cursor:pointer;text-align:center;transition:all 0.15s;font-weight:500}
.opt-btn:hover{border-color:var(--acc);color:var(--text)}
.opt-btn.active{background:rgba(88,166,255,0.12);border-color:var(--acc);color:var(--acc)}
.type-btn{flex:1;min-width:70px;padding:12px 10px;border-radius:12px;border:2px solid var(--border);background:var(--bg);color:var(--muted);font-size:13px;cursor:pointer;text-align:center;font-weight:600;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.type-btn .icon{font-size:20px}
.type-btn:hover{border-color:var(--acc)}
.type-btn.active.cu-type{border-color:var(--cu);background:rgba(230,168,50,0.08);color:var(--cu)}
.type-btn.active.al-type{border-color:var(--al);background:rgba(168,184,200,0.08);color:var(--al)}
.type-btn.active.bb-type{border-color:var(--acc);background:rgba(88,166,255,0.08);color:var(--acc)}
#core-opts,#method-opts,#bb-opts{margin-top:12px}
.hidden{display:none!important}
.result-card{border:2px solid var(--border)}
.result-card.copper-card{border-color:rgba(230,168,50,0.5);background:rgba(230,168,50,0.03)}
.result-card.alum-card{border-color:rgba(168,184,200,0.5);background:rgba(168,184,200,0.03)}
.result-card.bb-card{border-color:rgba(88,166,255,0.5);background:rgba(88,166,255,0.03)}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.result-header .rtype{font-size:13px;font-weight:600}
.result-header .rlabel{font-size:12px;color:var(--muted)}
.result-main{display:flex;justify-content:space-between;align-items:flex-end}
.result-main .size{font-size:36px;font-weight:800;letter-spacing:1px}
.result-main .amp{font-size:16px;color:var(--muted)}
.copper-card .rtype{color:var(--cu)} .copper-card .size{color:var(--cu)}
.alum-card .rtype{color:var(--al)} .alum-card .size{color:var(--al)}
.bb-card .rtype{color:var(--acc)} .bb-card .size{color:var(--acc)}
.info-row{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.04)}
.info-row span b{color:var(--text);font-weight:500}
.both-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ref-table{width:100%;font-size:12px;border-collapse:collapse}
.ref-table th{text-align:left;color:var(--muted);font-weight:500;padding:7px 6px;border-bottom:2px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:1px}
.ref-table td{padding:6px 6px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text)}
.ref-table tr.hl td{color:var(--acc);font-weight:600;background:rgba(88,166,255,0.06)}
.ref-table tr.hl-cu td{color:var(--cu);font-weight:600;background:rgba(230,168,50,0.06)}
.ref-table tr.hl-al td{color:var(--al);font-weight:600;background:rgba(168,184,200,0.06)}
.note{color:var(--muted);font-size:11px;line-height:1.6;padding:10px 14px;background:rgba(210,153,29,0.05);border:1px solid rgba(210,153,29,0.12);border-radius:10px}
@media(max-width:400px){.result-main .size{font-size:28px}.both-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>⚡ 电缆 · 铜排选型工具</h1>
    <p>GB 50217-2018 &nbsp;|&nbsp; 铜缆 / 铝缆 / 铜排一键匹配</p>
  </header>

  <!-- 导体类型 -->
  <div class="card">
    <label class="slabel">导体类型</label>
    <div class="options-row" id="type-opts">
      <button class="type-btn active cu-type" data-type="cu">
        <span class="icon">🔶</span>铜电缆
      </button>
      <button class="type-btn al-type" data-type="al">
        <span class="icon">🔘</span>铝电缆
      </button>
      <button class="type-btn bb-type" data-type="bb">
        <span class="icon">🟦</span>铜排
      </button>
    </div>

    <!-- 电缆参数 (铜/铝共用) -->
    <div id="core-opts">
      <label class="slabel" style="margin-top:2px">电缆芯数</label>
      <div class="options-row" id="core-btns">
        <button class="opt-btn" data-val="1">单芯</button>
        <button class="opt-btn active" data-val="3">3芯</button>
        <button class="opt-btn" data-val="4">4芯</button>
        <button class="opt-btn" data-val="5">5芯</button>
      </div>
    </div>

    <!-- 敷设方式 (电缆) -->
    <div id="method-opts">
      <label class="slabel" style="margin-top:2px">敷设方式</label>
      <div class="options-row" id="method-btns">
        <button class="opt-btn active" data-val="air">空气中</button>
        <button class="opt-btn" data-val="pipe">穿管</button>
        <button class="opt-btn" data-val="buried">埋地</button>
      </div>
    </div>

    <!-- 铜排敷设 -->
    <div id="bb-opts" class="hidden">
      <label class="slabel" style="margin-top:2px">敷设方式</label>
      <div class="options-row" id="bb-method-btns">
        <button class="opt-btn active" data-val="open">户外架空</button>
        <button class="opt-btn" data-val="closed">户内封闭</button>
      </div>
    </div>
  </div>

  <!-- 电流输入 -->
  <div class="card">
    <label class="slabel">计算电流</label>
    <div class="input-row">
      <input type="number" id="current" value="200" min="1" step="1" oninput="calc()">
      <span class="unit">A</span>
    </div>
  </div>

  <!-- 结果 -->
  <div id="result-area"></div>

  <!-- 参考表 -->
  <div class="card" id="ref-card">
    <div style="font-size:14px;font-weight:600;margin-bottom:10px">📋 载流量参考表</div>
    <div style="overflow-x:auto" id="ref-table-wrap"></div>
  </div>

  <div class="note">
    ⚠️ <b>工程提示</b>：<br>
    1. 电缆数据参考 GB 50217-2018，铜排参考 DL/T 5222-2021<br>
    2. 铝电缆等效截面 ≈ 铜截面 × 1.6（铝导电率 ≈ 铜的 62%）<br>
    3. 电缆并列敷设间距 ≥ 2 倍外径；铜排并列间距 ≥ 排宽<br>
    4. 大电流 (≥400A) 优先考虑铜排，散热好、省空间
  </div>
</div>

<script>
// ==== 数据 ====
// 铜芯电缆载流量 (空气中 25°C)
var cuCable=[
  {s:1.5,a1:22,a3:18},{s:2.5,a1:30,a3:26},{s:4,a1:40,a3:35},{s:6,a1:50,a3:44},
  {s:10,a1:68,a3:60},{s:16,a1:90,a3:80},{s:25,a1:118,a3:105},{s:35,a1:145,a3:130},
  {s:50,a1:180,a3:160},{s:70,a1:225,a3:200},{s:95,a1:275,a3:245},{s:120,a1:320,a3:285},
  {s:150,a1:365,a3:325},{s:185,a1:415,a3:370},{s:240,a1:490,a3:435},{s:300,a1:560,a3:500}
];

// 铝芯电缆载流量 = 铜 × 0.77
function alCableAmp(cu){ return Math.round(cu*0.77); }

// 铜排载流量
var busbar=[
  {spec:'40×4', area:160, open:640, closed:512},
  {spec:'50×5', area:250, open:950, closed:760},
  {spec:'60×6', area:360, open:1250, closed:1000},
  {spec:'80×8', area:640, open:1800, closed:1440},
  {spec:'100×10',area:1000,open:2500, closed:2000},
  {spec:'120×12',area:1440,open:3100, closed:2480},
  {spec:'150×15',area:2250,open:4000, closed:3200},
  {spec:'200×20',area:4000,open:5800, closed:4640}
];

// 修正系数
var cableMethod={air:1.0, pipe:0.72, buried:0.85};
var coreFactors={1:1.0, 3:1.0, 4:0.9, 5:0.8};

// ==== 状态 ====
var curType='cu', curCore='3', curMethod='air', curBbMethod='open';

// 类型切换
document.querySelectorAll('#type-opts .type-btn').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('#type-opts .type-btn').forEach(function(x){x.classList.remove('active')});
    this.classList.add('active');
    curType=this.dataset.type;
    document.getElementById('core-opts').classList.toggle('hidden',curType==='bb');
    document.getElementById('method-opts').classList.toggle('hidden',curType==='bb');
    document.getElementById('bb-opts').classList.toggle('hidden',curType!=='bb');
    calc();
  });
});

// 芯数
document.querySelectorAll('#core-btns .opt-btn').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('#core-btns .opt-btn').forEach(function(x){x.classList.remove('active')});
    this.classList.add('active');
    curCore=this.dataset.val; calc();
  });
});

// 敷设
document.querySelectorAll('#method-btns .opt-btn').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('#method-btns .opt-btn').forEach(function(x){x.classList.remove('active')});
    this.classList.add('active');
    curMethod=this.dataset.val; calc();
  });
});

// 铜排敷设
document.querySelectorAll('#bb-method-btns .opt-btn').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('#bb-method-btns .opt-btn').forEach(function(x){x.classList.remove('active')});
    this.classList.add('active');
    curBbMethod=this.dataset.val; calc();
  });
});

// ==== 计算 ====
function calc(){
  var I=parseFloat(document.getElementById('current').value)||0;
  var area=document.getElementById('result-area');
  if(I<=0){ area.innerHTML=''; return; }

  var html='';

  if(curType==='cu'){
    // 铜电缆
    var mf=cableMethod[curMethod], cf=coreFactors[curCore];
    var Ieq=I/(mf*cf);
    var sel=null;
    for(var i=0;i<cuCable.length;i++){
      var a=curCore==='1'?cuCable[i].a1:cuCable[i].a3;
      if(!sel&&a>=Ieq) sel={r:cuCable[i], amp:a};
    }
    if(!sel){ var last=cuCable[cuCable.length-1]; sel={r:last,amp:curCore==='1'?last.a1:last.a3}; }

    html+=buildCuResult(sel.r.s, sel.amp, I, Ieq, mf, cf, curCore);
    // 铝等效
    var alEqS=Math.round(sel.r.s*1.6);
    var alEqA=alCableAmp(sel.amp);
    html+=buildAlResult(alEqS, alEqA, Ieq, '等效');

    renderCuRef(sel.r.s, -1);
  }
  else if(curType==='al'){
    // 铝电缆
    var mf=cableMethod[curMethod], cf=coreFactors[curCore];
    var Ieq=I/(mf*cf);
    var sel=null;
    for(var i=0;i<cuCable.length;i++){
      var cuA=curCore==='1'?cuCable[i].a1:cuCable[i].a3;
      var alA=alCableAmp(cuA);
      if(!sel&&alA>=Ieq) sel={r:cuCable[i], amp:alA};
    }
    if(!sel){ var last=cuCable[cuCable.length-1]; sel={r:last,amp:alCableAmp(curCore==='1'?last.a1:last.a3)}; }

    html+=buildAlResult(sel.r.s, sel.amp, I, Ieq, mf, cf, curCore, true);
    renderAlRef(sel.r.s);
  }
  else if(curType==='bb'){
    // 铜排
    var sel=null;
    for(var i=0;i<busbar.length;i++){
      var a=curBbMethod==='open'?busbar[i].open:busbar[i].closed;
      if(!sel&&a>=I) sel={b:busbar[i], amp:a};
    }
    if(!sel) sel={b:busbar[busbar.length-1], amp:curBbMethod==='open'?busbar[busbar.length-1].open:busbar[busbar.length-1].closed};

    html+=buildBbResult(sel.b, sel.amp, I);
    renderBbRef(sel.b.spec);
  }

  area.innerHTML=html;
}

function buildCuResult(s,amp,I,Ieq,mf,cf,core){
  var cls=curType==='cu'?'both-grid':'';
  var mname={air:'空气中',pipe:'穿管',buried:'埋地'};
  var cname={'1':'单芯','3':'3芯','4':'4芯','5':'5芯'};
  return '<div class="card result-card copper-card">'+
    '<div class="result-header"><span class="rtype">🔶 铜电缆选型</span><span class="rlabel">'+cname[core]+' · '+mname[curMethod]+'</span></div>'+
    '<div class="result-main"><span class="size">'+s+' mm²</span><span class="amp">安全载流量 '+amp+' A</span></div>'+
    '<div class="info-row"><span>输入 <b>'+I+' A</b></span><span>等效 <b>'+Math.round(Ieq)+' A</b></span><span>修正 <b>×'+(mf*cf).toFixed(2)+'</b></span></div>'+
  '</div>';
}

function buildAlResult(s,amp,I,Ieq,mf,cf,core,isMain){
  var mname={air:'空气中',pipe:'穿管',buried:'埋地'};
  var cname={'1':'单芯','3':'3芯','4':'4芯','5':'5芯'};
  var label=isMain?'🔘 铝电缆选型（直接选）':'🔘 等效铝电缆（同载流量）';
  var sub=isMain?(cname[core]+' · '+mname[curMethod]):'铝截面 ≈ 铜 × 1.6';
  return '<div class="card result-card alum-card" style="margin-top:12px">'+
    '<div class="result-header"><span class="rtype">'+label+'</span><span class="rlabel">'+sub+'</span></div>'+
    '<div class="result-main"><span class="size">'+s+' mm²</span><span class="amp">安全载流量 '+amp+' A</span></div>'+
    '<div class="info-row"><span>输入 <b>'+I+' A</b></span>'+(Ieq!==undefined?'<span>等效 <b>'+Math.round(Ieq)+' A</b></span>':'')+'<span>铝载流量 ≈ 铜 × 0.77</span></div>'+
  '</div>';
}

function buildBbResult(b,amp,I){
  return '<div class="card result-card bb-card">'+
    '<div class="result-header"><span class="rtype">🟦 铜排选型</span><span class="rlabel">'+(curBbMethod==='open'?'户外架空':'户内封闭')+'</span></div>'+
    '<div class="result-main"><span class="size">'+b.spec+'</span><span class="amp">截面积 '+b.area+' mm² &nbsp; 载流量 '+amp+' A</span></div>'+
    '<div class="info-row"><span>输入 <b>'+I+' A</b></span><span>铜排 '+(curBbMethod==='open'?'架空':'封闭')+' 敷设</span></div>'+
  '</div>';
}

// ==== 参考表 ====
function renderCuRef(cuHl, alHl){
  var rows='<table class="ref-table"><thead><tr><th>截面 mm²</th><th>单芯 A</th><th>3芯 A</th><th>铝3芯 A</th><th>铝等效截面</th></tr></thead><tbody>';
  for(var i=0;i<cuCable.length;i++){
    var r=cuCable[i];
    var cls=(r.s===cuHl)?' class="hl-cu"':(r.s===alHl)?' class="hl-al"':'';
    var alA=alCableAmp(r.a3);
    var alEq=Math.round(r.s*1.6);
    rows+='<tr'+cls+'><td>'+r.s+' mm²</td><td>'+r.a1+'</td><td>'+r.a3+'</td><td>'+alA+'</td><td>≈ '+alEq+' mm²</td></tr>';
  }
  rows+='</tbody></table>';
  document.getElementById('ref-table-wrap').innerHTML=rows;
}

function renderAlRef(alHl){
  var rows='<table class="ref-table"><thead><tr><th>铝截面 mm²</th><th>铝单芯 A</th><th>铝3芯 A</th><th>等效铜截面</th></tr></thead><tbody>';
  for(var i=0;i<cuCable.length;i++){
    var r=cuCable[i];
    var alA1=alCableAmp(r.a1), alA3=alCableAmp(r.a3);
    var cls=(r.s===alHl)?' class="hl-al"':'';
    rows+='<tr'+cls+'><td>'+r.s+' mm²</td><td>'+alA1+'</td><td>'+alA3+'</td><td>≈ '+Math.round(r.s/1.6)+' mm²</td></tr>';
  }
  rows+='</tbody></table>';
  document.getElementById('ref-table-wrap').innerHTML=rows;
}

function renderBbRef(specHl){
  var rows='<table class="ref-table"><thead><tr><th>规格</th><th>截面积 mm²</th><th>架空 A</th><th>封闭 A</th></tr></thead><tbody>';
  for(var i=0;i<busbar.length;i++){
    var b=busbar[i];
    var cls=(b.spec===specHl)?' class="hl"':'';
    rows+='<tr'+cls+'><td>'+b.spec+'</td><td>'+b.area+'</td><td>'+b.open+'</td><td>'+b.closed+'</td></tr>';
  }
  rows+='</tbody></table>';
  document.getElementById('ref-table-wrap').innerHTML=rows;
}

calc();
</script>
</body>
</html>
